<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💩 PoopLog — Gut Health Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #070401;
  --surface: #110a03;
  --card:    #1a1005;
  --card2:   #221506;
  --border:  rgba(200,130,20,0.15);
  --brite:   rgba(200,130,20,0.45);
  --amber:   #c88214;
  --gold:    #e9a825;
  --neon:    #f5c842;
  --cream:   #fde99a;
  --dim:     rgba(253,233,154,0.42);
  --txt:     #fde99a;
  --red:     #e03c3c;
  --redsub:  #7f1d1d;
  --grn:     #22c55e;
  --blue:    #38bdf8;
  --r:       20px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Plus Jakarta Sans', sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
}
#bgc { position:fixed; inset:0; z-index:0; pointer-events:none; }
.root { position:relative; z-index:1; }

/* ── HEADER ── */
.header {
  position:relative; overflow:hidden;
  background:linear-gradient(180deg, #1f0d00 0%, #0e0602 100%);
  padding:44px 20px 56px;
  text-align:center;
  border-bottom:1px solid var(--brite);
}
.header::after {
  content:'';
  position:absolute; bottom:-1px; left:0; right:0; height:80px;
  background:linear-gradient(to bottom, transparent, var(--bg));
  pointer-events:none;
}
.halo {
  position:absolute; top:-80px; left:50%; transform:translateX(-50%);
  width:480px; height:480px; border-radius:50%;
  background:radial-gradient(circle, rgba(200,130,20,0.12) 0%, transparent 68%);
  animation:halo 6s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes halo { from{transform:translateX(-50%) scale(1);} to{transform:translateX(-50%) scale(1.35);} }

.hero-icon {
  font-size:72px; display:inline-block;
  filter:drop-shadow(0 0 28px rgba(245,200,66,0.7));
  animation:hbob 2s ease-in-out infinite;
  position:relative; z-index:1;
}
@keyframes hbob {
  0%,100%{ transform:translateY(0) rotate(-4deg); }
  50%    { transform:translateY(-16px) rotate(5deg); }
}
.hero-title {
  font-family:'Syne', sans-serif;
  font-size:clamp(2.6rem, 9vw, 5.2rem);
  font-weight:800;
  letter-spacing:6px;
  background:linear-gradient(135deg, #fde99a 0%, #e9a825 45%, #c88214 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  margin:8px 0 6px;
  position:relative; z-index:1;
}
.hero-sub {
  font-size:.9rem; font-weight:600;
  color:var(--dim); letter-spacing:3px; text-transform:uppercase;
  margin-bottom:20px;
  position:relative; z-index:1;
}
.streak-chip {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(200,130,20,0.12);
  border:1.5px solid var(--brite);
  border-radius:100px; padding:8px 22px;
  font-size:.85rem; font-weight:700; letter-spacing:.5px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(200,130,20,0.18);
  position:relative; z-index:1;
}
.streak-fire { animation:fireshake .25s infinite alternate; display:inline-block; }
@keyframes fireshake { from{transform:rotate(-5deg) scale(1);} to{transform:rotate(5deg) scale(1.2);} }

/* ── TICKER ── */
.ticker {
  background:linear-gradient(90deg, #3d1f00, #7a4200, #3d1f00);
  padding:9px 0; overflow:hidden; white-space:nowrap;
  border-bottom:1px solid rgba(200,130,20,0.25);
  user-select:none;
}
.ticker-inner { display:inline-flex; animation:tick 36s linear infinite; }
.ticker-inner span {
  font-size:.82rem; font-weight:700; color:#fde99a;
  padding:0 32px; letter-spacing:.5px;
}
@keyframes tick { from{transform:translateX(0);} to{transform:translateX(-50%);} }

/* ── CONTAINER ── */
.container { max-width:860px; margin:0 auto; padding:28px 16px 100px; }

/* ── SECTION TITLE ── */
.sec {
  font-family:'Syne', sans-serif;
  font-size:1.05rem; font-weight:800;
  color:var(--neon); letter-spacing:2px; text-transform:uppercase;
  margin:32px 0 14px;
  display:flex; align-items:center; gap:10px;
}
.sec::before { content:attr(data-icon); font-size:1.1rem; }
.sec::after  { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--brite),transparent); }

/* ── CARD BASE ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  transition:border-color .25s, box-shadow .25s;
}
.card:hover {
  border-color:rgba(200,130,20,0.35);
  box-shadow:0 0 30px rgba(200,130,20,0.08);
}

/* ── CRAMP BANNER ── */
.cramp {
  display:none; border-radius:18px; padding:22px 20px;
  background:linear-gradient(135deg,#5c0808,#8b1414,#c0202020);
  border:1.5px solid rgba(224,60,60,0.8); text-align:center;
  margin-bottom:14px;
  box-shadow:0 0 60px rgba(224,60,60,0.35);
}
.cramp.show { display:block; animation:cpulse .55s ease infinite alternate; }
@keyframes cpulse {
  from { box-shadow:0 0 40px rgba(224,60,60,0.3); border-color:rgba(224,60,60,0.65); }
  to   { box-shadow:0 0 80px rgba(224,60,60,0.7), 0 0 0 6px rgba(224,60,60,0.1); border-color:rgba(224,60,60,1); }
}
.cramp-icon { font-size:2.8rem; display:inline-block; animation:cwag .18s infinite alternate; }
@keyframes cwag { from{transform:rotate(-9deg);} to{transform:rotate(9deg) scale(1.1);} }
.cramp h2 { font-family:'Syne',sans-serif; font-size:1.75rem; color:#fff; margin:6px 0 4px; letter-spacing:1px; }
.cramp p  { font-size:.88rem; color:rgba(255,255,255,.82); font-weight:600; line-height:1.6; }
.cramp-btns { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.btn-dismiss {
  background:rgba(255,255,255,0.14); border:1.5px solid rgba(255,255,255,0.35);
  color:#fff; border-radius:100px; padding:9px 22px;
  font-weight:700; cursor:pointer; font-size:.84rem;
  font-family:'Plus Jakarta Sans',sans-serif; transition:all .2s;
}
.btn-dismiss:hover { background:rgba(255,255,255,0.25); }

/* ── TIP CARD ── */
.tip-card {
  display:flex; align-items:center; gap:14px;
  padding:15px 18px; border-radius:14px;
  background:linear-gradient(135deg,rgba(61,26,0,.8),rgba(22,10,0,.9));
  border-left:3px solid var(--amber);
  border:1px solid var(--border);
  margin-bottom:20px;
  transition:opacity .5s;
}
.tip-icon { font-size:1.75rem; flex-shrink:0; }
.tip-text { font-size:.83rem; font-weight:500; color:var(--cream); line-height:1.55; }

/* ── HERO CARD ── */
.hero-card {
  padding:26px; border-radius:22px;
  background:radial-gradient(ellipse at 25% 50%,rgba(107,47,0,0.45),rgba(22,10,0,0.9));
  border:1px solid var(--brite);
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:18px;
  box-shadow:0 16px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  animation:fadeUp .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px) scale(.96);} to{opacity:1;transform:none;} }

.count-block { text-align:center; }
.count-num {
  font-family:'Syne',sans-serif; font-size:5.5rem; font-weight:800; line-height:1;
  background:linear-gradient(180deg,#fde99a,#d97706);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:glow 2.5s ease-in-out infinite alternate;
}
@keyframes glow {
  from{ filter:drop-shadow(0 0 12px rgba(245,200,66,0.4)); }
  to  { filter:drop-shadow(0 0 32px rgba(245,200,66,0.85)); }
}
.count-lbl { font-size:.72rem; font-weight:700; color:var(--dim); letter-spacing:2.5px; text-transform:uppercase; margin-top:-6px; }

.meta-block { text-align:center; }
.meta-val { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; color:var(--neon); }
.meta-lbl { font-size:.65rem; font-weight:700; color:var(--dim); letter-spacing:1.8px; text-transform:uppercase; }

.action-col { display:flex; flex-direction:column; gap:10px; }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 22px; border-radius:100px; border:none;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:.9rem; font-weight:700;
  cursor:pointer; transition:all .2s; letter-spacing:.3px;
  position:relative; overflow:hidden;
}
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.11),transparent);
  border-radius:inherit;
}
.btn:active { transform:scale(.95)!important; }

.btn-primary {
  background:linear-gradient(135deg,#e9a825,#c88214);
  color:#1a0800; font-weight:800;
  box-shadow:0 4px 18px rgba(200,130,20,0.45);
  animation:btnpulse 2.5s ease-in-out infinite;
}
@keyframes btnpulse {
  0%,100%{ box-shadow:0 4px 18px rgba(200,130,20,0.45); }
  50%    { box-shadow:0 4px 28px rgba(200,130,20,0.75), 0 0 42px rgba(200,130,20,0.2); }
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(200,130,20,0.65)!important; }

.btn-danger {
  background:linear-gradient(135deg,#dc2626,#991b1b);
  color:#fff; font-weight:700;
  box-shadow:0 4px 16px rgba(220,38,38,0.4);
  animation:rdpulse 2s ease-in-out infinite;
}
@keyframes rdpulse {
  0%,100%{ box-shadow:0 4px 16px rgba(220,38,38,0.4); }
  50%    { box-shadow:0 4px 24px rgba(220,38,38,0.75); }
}
.btn-danger:hover { transform:translateY(-2px); }

.btn-ghost {
  background:rgba(200,130,20,0.08); color:var(--neon);
  border:1.5px solid rgba(200,130,20,0.25); font-weight:600;
}
.btn-ghost:hover { background:rgba(200,130,20,0.15); border-color:var(--brite); transform:translateY(-2px); }

/* ── URGENCY METER ── */
.urg-card { padding:20px; }
.urg-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.urg-title { font-size:.82rem; font-weight:600; color:var(--dim); }
.urg-status { font-family:'Syne',sans-serif; font-size:.88rem; font-weight:700; }
.urg-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.urg-btn {
  background:rgba(16,8,0,.8); border:1.5px solid var(--border);
  border-radius:14px; padding:14px 6px 10px; text-align:center;
  cursor:pointer; transition:all .22s; font-size:.68rem; font-weight:700; color:var(--dim);
}
.urg-btn .ue { font-size:1.8rem; display:block; margin-bottom:6px; transition:transform .2s; }
.urg-btn:hover { border-color:var(--amber); transform:translateY(-3px); color:var(--txt); }
.urg-btn:hover .ue { transform:scale(1.2); }
.ua { border-color:var(--grn)!important; background:rgba(34,197,94,.09)!important; color:#4ade80!important; box-shadow:0 0 16px rgba(34,197,94,.15)!important; }
.ub { border-color:#eab308!important; background:rgba(234,179,8,.09)!important; color:#fde047!important; box-shadow:0 0 16px rgba(234,179,8,.15)!important; }
.uc { border-color:#f97316!important; background:rgba(249,115,22,.09)!important; color:#fb923c!important; box-shadow:0 0 16px rgba(249,115,22,.15)!important; }
.ud { border-color:var(--red)!important; background:rgba(224,60,60,.09)!important; color:#f87171!important; animation:udpulse .45s infinite alternate!important; }
@keyframes udpulse { from{box-shadow:0 0 14px rgba(224,60,60,.25);} to{box-shadow:0 0 40px rgba(224,60,60,.65);} }
.urg-msg { margin-top:12px; font-size:.82rem; font-weight:600; text-align:center; min-height:20px; }

/* ── SYMPTOM ── */
.sym-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.sym-item {
  background:rgba(14,6,0,.8); border:1.5px solid var(--border);
  border-radius:16px; padding:16px 10px 12px; text-align:center;
  cursor:pointer; transition:all .22s; font-size:.72rem; font-weight:600;
  color:var(--dim); position:relative; overflow:hidden;
}
.sym-item::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 50% 0%,rgba(200,130,20,.07),transparent 70%);
  opacity:0; transition:opacity .3s;
}
.sym-item:hover::after { opacity:1; }
.sym-item:hover { border-color:rgba(200,130,20,.5); transform:translateY(-3px); color:var(--txt); }
.sym-icon { font-size:2rem; display:block; margin-bottom:6px; transition:transform .2s; }
.sym-item:hover .sym-icon { transform:scale(1.15) rotate(-5deg); }
.sym-item.active { border-color:rgba(224,60,60,.7)!important; background:rgba(224,60,60,.08)!important; color:#f87171!important; }
.sym-item.active .sym-icon { animation:symshake .2s infinite alternate; }
@keyframes symshake { from{transform:rotate(-5deg);} to{transform:rotate(5deg);} }
.sym-dot { position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:50%; background:var(--red); opacity:0; }
.sym-item.active .sym-dot { opacity:1; animation:dotblink .8s infinite; }
@keyframes dotblink { 0%,100%{opacity:1;} 50%{opacity:.1;} }

/* ── WATER ── */
.water-card { padding:18px 20px; }
.cups-row { display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 8px; }
.cup {
  width:44px; height:44px; border-radius:12px;
  border:1.5px solid rgba(56,189,248,.22);
  background:rgba(8,4,0,.7);
  cursor:pointer; transition:all .2s; position:relative;
  display:flex; align-items:center; justify-content:center; font-size:1.2rem;
}
.cup:hover { transform:scale(1.12) translateY(-3px); border-color:rgba(56,189,248,.7); }
.cup.full { background:linear-gradient(180deg,rgba(125,211,252,.28),rgba(14,165,233,.45)); border-color:rgba(125,211,252,.75); box-shadow:0 0 12px rgba(14,165,233,.28); }
.water-label { font-size:.82rem; font-weight:600; color:var(--blue); letter-spacing:.5px; }

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(126px,1fr)); gap:10px; }
.stat-card {
  padding:18px 14px; text-align:center;
  background:rgba(12,6,0,.85); border:1px solid var(--border); border-radius:18px;
  transition:all .22s; position:relative; overflow:hidden;
}
.stat-card::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  transform:scaleX(0); transition:transform .3s;
}
.stat-card:hover::after { transform:scaleX(1); }
.stat-card:hover { border-color:rgba(200,130,20,.4); box-shadow:0 0 22px rgba(200,130,20,.1); }
.stat-icon { font-size:1.75rem; margin-bottom:4px; }
.stat-val { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--neon); line-height:1; }
.stat-lbl { font-size:.62rem; font-weight:700; color:var(--dim); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }

/* ── CHART ── */
.chart-card { padding:20px; }
.chart-bars { display:flex; align-items:flex-end; gap:8px; height:90px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.bar-fill {
  width:100%; border-radius:6px 6px 2px 2px;
  background:linear-gradient(180deg,var(--amber),#4a1f00);
  min-height:4px; transition:height .7s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden;
}
.bar-fill::after { content:''; position:absolute; top:0; left:0; right:0; height:30%; background:rgba(255,255,255,.09); }
.bar-fill.today { background:linear-gradient(180deg,#fde99a,#e9a825); box-shadow:0 0 14px rgba(253,233,154,.4); }
.bar-n { font-size:.58rem; font-weight:800; color:var(--amber); }
.bar-d { font-size:.55rem; font-weight:700; color:var(--dim); }
.bar-d.td { color:var(--neon); font-size:.62rem; }

/* ── DIGESTION RING ── */
.score-card { padding:22px; text-align:center; }
.ring-wrap { position:relative; width:144px; height:144px; margin:0 auto 18px; }
.ring-wrap svg { transform:rotate(-90deg); }
.ring-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-family:'Syne',sans-serif; font-size:2.4rem; font-weight:800; color:var(--neon); line-height:1; }
.ring-sub { font-size:.58rem; font-weight:700; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
.tips-list { list-style:none; text-align:left; }
.tips-list li {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 14px; background:rgba(10,5,0,.75); border-radius:12px;
  margin-bottom:8px; font-size:.8rem; color:var(--cream); font-weight:500;
  border:1px solid var(--border); line-height:1.5;
}
.tips-list li .tip-ic { flex-shrink:0; font-size:1rem; margin-top:1px; }

/* ── BRISTOL ── */
.bristol-section { background:rgba(12,6,0,.85); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
.bristol-header { padding:16px 20px 0; }
.bristol-header h3 { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:800; color:var(--neon); letter-spacing:1px; }
.bristol-header p { font-size:.76rem; color:var(--dim); margin-top:3px; }
.bristol-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); margin-top:14px; }
.b-cell {
  background:rgba(12,6,0,.9); padding:14px 8px; text-align:center;
  cursor:default; transition:background .2s;
}
.b-cell:hover { background:rgba(200,130,20,.07); }
.b-emo { font-size:1.75rem; display:block; margin-bottom:5px; }
.b-type { font-family:'Syne',sans-serif; font-size:.68rem; font-weight:800; color:var(--amber); }
.b-name { font-size:.65rem; font-weight:600; color:var(--dim); margin:2px 0 1px; }
.b-desc { font-size:.58rem; color:rgba(253,233,154,.3); }

/* ── GUT FACTS ── */
.facts-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.fact-card {
  padding:16px; background:rgba(12,6,0,.85); border:1px solid var(--border);
  border-radius:16px; transition:all .22s; display:flex; gap:12px; align-items:flex-start;
}
.fact-card:hover { border-color:rgba(200,130,20,.4); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4); }
.fact-icon { font-size:1.6rem; flex-shrink:0; }
.fact-content h4 { font-family:'Syne',sans-serif; font-size:.78rem; font-weight:800; color:var(--neon); margin-bottom:4px; }
.fact-content p  { font-size:.72rem; color:var(--cream); line-height:1.5; font-weight:500; opacity:.85; }

/* ── LOG LIST ── */
.log-list { display:flex; flex-direction:column; gap:8px; }
.log-entry {
  background:rgba(14,7,0,.88); border:1px solid var(--border);
  border-radius:14px; padding:13px 16px;
  display:flex; align-items:center; gap:12px;
  transition:all .2s; animation:fadeUp .35s ease both;
}
.log-entry:hover { border-color:rgba(200,130,20,.4); transform:translateX(4px); }
.log-time { font-family:'Syne',sans-serif; font-size:.72rem; color:var(--dim); min-width:46px; }
.log-info { flex:1; }
.log-type { font-weight:700; font-size:.84rem; color:var(--txt); }
.log-meta { font-size:.68rem; color:var(--dim); margin-top:2px; }
.log-feel { font-size:1.2rem; }
.log-del { background:none; border:none; cursor:pointer; color:rgba(224,60,60,.25); font-size:.88rem; transition:color .2s; padding:4px; }
.log-del:hover { color:var(--red); }

/* ── TOGGLES ── */
.toggle-card {
  background:rgba(14,7,0,.85); border:1px solid var(--border); border-radius:14px;
  padding:14px 17px; display:flex; align-items:center; justify-content:space-between;
  margin-bottom:8px; transition:border-color .2s;
}
.toggle-card:hover { border-color:rgba(200,130,20,.35); }
.toggle-label h4 { font-weight:700; font-size:.84rem; color:var(--txt); }
.toggle-label p  { font-size:.68rem; color:var(--dim); margin-top:2px; }
.switch { position:relative; width:44px; height:24px; flex-shrink:0; }
.switch input { opacity:0; width:0; height:0; }
.track {
  position:absolute; cursor:pointer; inset:0;
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  border-radius:100px; transition:.3s;
}
.track::before {
  content:''; position:absolute; width:18px; height:18px; left:3px; top:3px;
  background:var(--dim); border-radius:50%; transition:.3s;
}
.switch input:checked + .track { background:rgba(200,130,20,.25); border-color:var(--amber); }
.switch input:checked + .track::before { transform:translateX(20px); background:var(--amber); box-shadow:0 0 9px rgba(200,130,20,.4); }

/* ── MODAL ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.78); backdrop-filter:blur(12px);
  z-index:500; align-items:center; justify-content:center; padding:16px;
}
